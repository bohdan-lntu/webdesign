<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гра While - КН-22, Барулін Богдан</title>
  <style>
    body { max-width: 820px; margin: 32px auto; font-family: Arial, sans-serif; line-height: 1.55; color: #222; }
    .task { padding: 14px 18px; background: #eef5ff; border-left: 4px solid #2768b5; }
    .result { margin-top: 18px; padding: 16px; border: 1px solid #ccd7e4; border-radius: 8px; background: #fbfdff; }
  </style>
</head>
<body>
  <h1>Завдання 6. Гра з користувачем і цикл while</h1>
  <p class="task">Користувач має вгадати випадкове число від 1 до 50. Цикл while працює до правильної відповіді або скасування гри.</p>
  <p><strong>Розробник:</strong> КН-22, Барулін Богдан.</p>

  <script>
    "use strict";

    function playGuessGame() {
      const secretNumber = Math.floor(Math.random() * 50) + 1;
      let attempts = 0;
      let isPlaying = true;
      let message = "Гру завершено.";

      while (isPlaying) {
        const input = prompt("Вгадайте число від 1 до 50", "25");

        if (input === null) {
          message = "Гру скасовано. Загадане число було " + secretNumber + ".";
          break;
        }

        const userNumber = parseInt(input, 10);

        if (Number.isNaN(userNumber)) {
          alert("Потрібно ввести число.");
          continue;
        }

        attempts++;

        if (userNumber === secretNumber) {
          message = "Вітаю! Ви вгадали число " + secretNumber + " за " + attempts + " спроб.";
          isPlaying = false;
        } else if (userNumber > secretNumber) {
          alert("Загадане число менше.");
        } else {
          alert("Загадане число більше.");
        }
      }

      return message;
    }

    const wantsToPlay = confirm("Зіграємо у гру 'Вгадай число'?");
    const result = wantsToPlay ? playGuessGame() : "Користувач відмовився від гри.";

    document.write("<div class='result'><strong>Результат:</strong> " + result + "</div>");
  </script>

<div style="margin:40px auto 0;max-width:960px;padding:0 20px 40px;">
  <details>
    <summary style="cursor:pointer;padding:10px 16px;background:#1e1e2e;color:#cdd6f4;border-radius:6px;font-size:13px;user-select:none;">&#9656; Переглянути вихідний код</summary>

</div>

</body>
