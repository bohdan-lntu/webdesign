<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch - КН-22, Барулін Богдан</title>
  <style>
    body { max-width: 820px; margin: 32px auto; font-family: Arial, sans-serif; line-height: 1.55; color: #222; }
    .task { padding: 14px 18px; background: #eef5ff; border-left: 4px solid #2768b5; }
    .result { margin-top: 18px; padding: 16px; border: 1px solid #ccd7e4; border-radius: 8px; background: #fbfdff; }
  </style>
</head>
<body>
  <h1>Завдання 3. Використання оператора SWITCH</h1>
  <p class="task">За номером місяця визначити пору року та короткий опис.</p>
  <p><strong>Розробник:</strong> КН-22, Барулін Богдан.</p>

  <script>
    "use strict";

    function getSeason(month) {
      switch (month) {
        case 12:
        case 1:
        case 2:
          return "зима";
        case 3:
        case 4:
        case 5:
          return "весна";
        case 6:
        case 7:
        case 8:
          return "літо";
        case 9:
        case 10:
        case 11:
          return "осінь";
        default:
          return "невідомо";
      }
    }

    function getSeasonDescription(season) {
      switch (season) {
        case "зима":
          return "Час снігу, свят і коротких днів.";
        case "весна":
          return "Період оновлення природи.";
        case "літо":
          return "Найтепліша пора року.";
        case "осінь":
          return "Пора врожаю та різнокольорового листя.";
        default:
          return "Такого номера місяця не існує.";
      }
    }

    const month = parseInt(prompt("Введіть номер місяця від 1 до 12", "5"), 10);
    const season = getSeason(month);

    document.write("<div class='result'>");
    document.write("<p><strong>Номер місяця:</strong> " + month + "</p>");
    document.write("<p><strong>Пора року:</strong> " + season + "</p>");
    document.write("<p><strong>Опис:</strong> " + getSeasonDescription(season) + "</p>");
    document.write("</div>");
  </script>
</body>
</html>
