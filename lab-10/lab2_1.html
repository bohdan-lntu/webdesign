<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>If Else - КН-22, Барулін Богдан</title>
  <style>
    body { max-width: 820px; margin: 32px auto; font-family: Arial, sans-serif; line-height: 1.55; color: #222; }
    .task { padding: 14px 18px; background: #eef5ff; border-left: 4px solid #2768b5; }
    .result { margin-top: 18px; padding: 16px; border: 1px solid #ccd7e4; border-radius: 8px; background: #fbfdff; }
  </style>
</head>
<body>
  <h1>Завдання 1. Використання умовного оператора IF</h1>
  <p class="task">Задати змінну <strong>lang</strong> і за допомогою if, else if та else вивести повну назву мови.</p>
  <p><strong>Розробник:</strong> КН-22, Барулін Богдан.</p>

  <script>
    "use strict";

    function getLanguageName(lang) {
      const code = lang.toLowerCase();

      if (code === "ua") {
        return "українська";
      } else if (code === "en") {
        return "англійська";
      } else if (code === "pl") {
        return "польська";
      } else if (code === "de") {
        return "німецька";
      }

      return "Мову невизначено";
    }

    const lang = prompt("Введіть код мови: ua, en, pl або de", "ua") || "";
    const languageName = getLanguageName(lang.trim());

    document.write("<div class='result'>");
    document.write("<p><strong>Введений код:</strong> " + (lang || "порожнє значення") + "</p>");
    document.write("<p><strong>Результат:</strong> " + languageName + "</p>");
    document.write("</div>");
  </script>
</body>
</html>
