<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Діалогові вікна - КН-22, Барулін Богдан</title>
</head>
<body>
  <h1>Завдання 1. Робота з діалоговими вікнами</h1>
  <p>Сторінка демонструє методи alert(), confirm() та prompt().</p>

  <script>
    "use strict";

    alert("Вітаю! Це власне діалогове вікно для лабораторної роботи №9.");

    const wantsToContinue = confirm("Бажаєте виконати невелике знайомство з JavaScript?");

    if (wantsToContinue) {
      const userName = prompt("Введіть ваше ім'я", "Студент");
      const safeName = userName || "Гість";
      const favoriteTopic = prompt("Яка тема вебтехнологій вам цікава?", "JavaScript");

      alert(safeName + ", чудово! Тема \"" + (favoriteTopic || "JavaScript") + "\" справді корисна для веброзробки.");
    } else {
      alert("Шкода, але JavaScript ще обов'язково стане у пригоді!");
    }
  </script>

<div style="margin:40px auto 0;max-width:960px;padding:0 20px 40px;">
  <details>
    <summary style="cursor:pointer;padding:10px 16px;background:#1e1e2e;color:#cdd6f4;border-radius:6px;font-size:13px;user-select:none;">&#9656; Переглянути вихідний код</summary>
    <pre id="_src_" style="background:#1e1e2e;color:#cdd6f4;padding:20px;border-radius:0 0 6px 6px;overflow-x:auto;font-size:12px;line-height:1.6;margin:0;tab-size:2;"></pre>
  </details>
</div>
<script>(function(){var p=document.getElementById('_src_');if(p)p.textContent=document.documentElement.outerHTML;})();</script>
</body>
</html>
